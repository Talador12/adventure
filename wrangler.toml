name = "adventure"
main = "_worker.ts"
compatibility_date = "2024-01-01"
account_id = "41361179c1d85f87c496f78a9095b8c0"

[site]
bucket = "./public"

# Development: secrets come from .dev.vars (gitignored) - run `make secrets-development` to set up
[env.development]
name = "adventure-dev"
workers_dev = true
[env.development.ai]
binding = "AI"
[env.development.durable_objects]
bindings = [
  { name = "LOBBY", class_name = "Lobby" }
]
[[env.development.kv_namespaces]]
binding = "PORTRAITS"
id = "portraits-dev"
preview_id = "portraits-dev-preview"
[[env.development.kv_namespaces]]
binding = "CHARACTERS"
id = "characters-dev"
preview_id = "characters-dev-preview"
[[env.development.kv_namespaces]]
binding = "CAMPAIGNS"
id = "campaigns-dev"
preview_id = "campaigns-dev-preview"
[[env.development.r2_buckets]]
binding = "MAP_IMAGES"
bucket_name = "adventure-maps-dev"
preview_bucket_name = "adventure-maps-dev-preview"

[env.staging]
name = "adventure-staging"
workers_dev = true
[env.staging.ai]
binding = "AI"
[env.staging.durable_objects]
bindings = [
  { name = "LOBBY", class_name = "Lobby" }
]
# TODO: create KV namespaces with `wrangler kv namespace create <NAME> --env staging`
[[env.staging.kv_namespaces]]
binding = "PORTRAITS"
id = "portraits-staging"
[[env.staging.kv_namespaces]]
binding = "CHARACTERS"
id = "characters-staging"
[[env.staging.kv_namespaces]]
binding = "CAMPAIGNS"
id = "campaigns-staging"
[[env.staging.r2_buckets]]
binding = "MAP_IMAGES"
bucket_name = "adventure-maps-staging"

[env.production]
name = "adventure"
workers_dev = false
[env.production.ai]
binding = "AI"
[env.production.durable_objects]
bindings = [
  { name = "LOBBY", class_name = "Lobby" }
]
# TODO: create KV namespaces with `wrangler kv namespace create <NAME>`
[[env.production.kv_namespaces]]
binding = "PORTRAITS"
id = "portraits-prod"
[[env.production.kv_namespaces]]
binding = "CHARACTERS"
id = "characters-prod"
[[env.production.kv_namespaces]]
binding = "CAMPAIGNS"
id = "campaigns-prod"
[[env.production.r2_buckets]]
binding = "MAP_IMAGES"
bucket_name = "adventure-maps-prod"

[[migrations]]
tag = "v1"
new_classes = ["Lobby"]

[dev]
port = 8787
local_protocol = "http"
inspector_port = 9229
