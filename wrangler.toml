name = "adventure"
main = "_worker.ts"
compatibility_date = "2024-01-01"
account_id = "41361179c1d85f87c496f78a9095b8c0"

[site]
bucket = "./public"

# Development: secrets come from .dev.vars (gitignored) - run `make secrets-development` to set up
[env.development]
name = "adventure-dev"
workers_dev = true
[env.development.ai]
binding = "AI"
[env.development.durable_objects]
bindings = [
  { name = "LOBBY", class_name = "Lobby" }
]
[[env.development.kv_namespaces]]
binding = "PORTRAITS"
id = "portraits-dev"
preview_id = "portraits-dev-preview"

[env.staging]
name = "adventure-staging"
workers_dev = true
[env.staging.ai]
binding = "AI"
[env.staging.durable_objects]
bindings = [
  { name = "LOBBY", class_name = "Lobby" }
]
# TODO: create real KV namespace with `wrangler kv namespace create PORTRAITS --env staging`
[[env.staging.kv_namespaces]]
binding = "PORTRAITS"
id = "portraits-staging"

[env.production]
name = "adventure"
workers_dev = false
[env.production.ai]
binding = "AI"
[env.production.durable_objects]
bindings = [
  { name = "LOBBY", class_name = "Lobby" }
]
# TODO: create real KV namespace with `wrangler kv namespace create PORTRAITS`
[[env.production.kv_namespaces]]
binding = "PORTRAITS"
id = "portraits-prod"

[[migrations]]
tag = "v1"
new_classes = ["Lobby"]

[dev]
port = 8787
local_protocol = "http"
inspector_port = 9229
