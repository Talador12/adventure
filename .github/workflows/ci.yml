name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --force
      - run: npx tsc --noEmit

  lint:
    name: Lint (Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --force
      - run: npx prettier --check "src/**/*.{ts,tsx}" || true # warn only, don't fail CI

  test-unit:
    name: Unit Tests (Game Logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --force
      - run: npx vitest run --config vitest.config.ts

  test-worker:
    name: Worker Tests (Multiplayer + AI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --force
      # Worker tests need .dev.vars for secrets — create minimal stub
      - run: echo "DISCORD_CLIENT_ID=test\nDISCORD_CLIENT_SECRET=test\nJWT_SECRET=test-secret-for-ci" > .dev.vars
      - run: npx vitest run --config vitest.workers.config.ts

  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --force
      - run: npx playwright install chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
